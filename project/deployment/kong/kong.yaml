_format_version: "3.0"

services:
  - name: authenticate-service
    url: http://host.docker.internal:8081
    routes:
      - name: authenticate-route
        paths: ["/api/auth", "/api/users/create-user", "/api/users/create"]
        strip_path: false

  - name: file-public-service
    url: http://host.docker.internal:8082
    routes:
      - name: file-public-route
        paths: ["/api/files"]
        strip_path: false

  - name: file-private-service
    url: http://host.docker.internal:8082
    routes:
      - name: file-private-route
        paths: ["/api/files/export"]
        strip_path: false
    plugins: &jwt_with_lua
      - name: jwt
        config:
          key_claim_name: iss
          claims_to_verify: [ "exp" ]
          header_names: [ "Authorization" ]

      - name: pre-function
        config:
          access:
            - |
              local jwt_decoder = require "kong.plugins.jwt.jwt_parser"
              local token_str = kong.request.get_header("Authorization")

              if token_str then
                if token_str:find("Bearer") then
                  token_str = token_str:sub(8)
                end

                local jwt, err = jwt_decoder:new(token_str)
                if jwt and jwt.claims then
                  kong.service.request.set_header("X-User-Id", jwt.claims.sub)
                  kong.service.request.set_header("X-User-Email", jwt.claims.email)
                  kong.service.request.set_header("X-User-Name", jwt.claims.preferred_username)
                  
                  local ra = jwt.claims.realm_access
                  if ra and ra.roles then
                    kong.service.request.set_header("X-User-Roles", table.concat(ra.roles, ","))
                  end
              
                  if jwt.claims.avatar then
                    kong.service.request.set_header("X-User-Avatar", jwt.claims.avatar)
                  end
                end
              end

#Profile Service
  - name: profile-service
    url: http://host.docker.internal:8083
    routes:
      - name: profile-route
        paths: ["/api/profiles"]
        strip_path: false
    plugins: *jwt_with_lua

#Post Service
  - name: post-public-service
    url: http://host.docker.internal:8084
    routes:
      - name: post-public-route
        paths: ["/api/posts"]
        strip_path: false

  - name: post-private-service
    url: http://host.docker.internal:8084
    routes:
      - name: post-private-route
        paths: ["/api/posts/create", "/api/debug/headers"]
        strip_path: false
    plugins: *jwt_with_lua

#Comment Service
  - name: comment-service
    url: http://host.docker.internal:8085
    routes:
      - name: comment-route
        paths: ["/api/comments", "/ping"]
        strip_path: false
    plugins: *jwt_with_lua

plugins:
  - name: rate-limiting
    config:
      second: 10
      policy: local
  - name: cors
    config:
      origins: ["*"]
      methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
      headers:
        - Authorization
        - Content-Type
