spring:
  application:
    name: profile
  datasource:
    url: jdbc:mysql://localhost:3306/profile?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/daokhanhhuyen
          jwk-set-uri: ${spring.security.oauth2.resourceserver.jwt.issuer-uri}/protocol/openid-connect/certs
  kafka:
    bootstrap-servers: localhost:9094
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
        acks: all

    consumer:
      group-id: profile-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
#      properties:
#        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
#        spring.json.trusted.packages: "com.august.sharecore.*"
#        spring.json.use.type.headers: false
#        spring.json.value.default.type: com.august.sharecore.events.UserRegisteredEvent
    listener:
      ack-mode: manual_immediate

server:
  port: 8083

grpc:
  server:
    port: 9091
  client:
    file-service-grpc:
      address: static://localhost:9000
      negotiation-type: PLAINTEXT

keycloak:
  serverUrl: http://localhost:9090
  realm: daokhanhhuyen
  client-id: identity-service
  client-secret: jNJ6jaVjlxwd4jalbmFAQh6w2itmrOfj
