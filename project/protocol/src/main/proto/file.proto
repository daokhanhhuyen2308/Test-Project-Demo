syntax = "proto3";

option java_multiple_files = true;
option java_package="com.august.protocol.file";

enum FilePurpose {
  UNKNOWN = 0;
  AVATAR = 1;
  THUMBNAIL = 2;
  DOCUMENT = 3;
  ATTACHMENT = 4;
}

enum UploadStatus {
  UPLOAD_UNKNOWN = 0;
  SUCCESS = 1;
  FAILED = 2;
}

message UploadFileRequest{
  bytes file = 1;
  string file_name = 2;
  string content_type = 3;
  string owner_id = 4;
  FilePurpose purpose = 6;
}

message UploadFileResponse {
  string file_id = 1;
  string url = 2;
  FilePurpose purpose = 3;
  UploadStatus status = 4;
}

service FileService{
  rpc UploadFile (UploadFileRequest) returns (UploadFileResponse);
}



