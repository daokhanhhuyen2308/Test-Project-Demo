spring:
  application:
    name: gateway

  cloud:
    gateway:
      routes:
        - id: authenticate-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: file-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/files/**

        - id: comment-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/comments/**

server:
  port: 8888